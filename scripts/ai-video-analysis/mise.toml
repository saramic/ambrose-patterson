[tasks.compress]
description = "Compress video for AI analysis (720p, 1fps, low bitrate)"
run = [
  """
    INPUT={{arg(name="input")}}
    OUTPUT="${INPUT%.*}-ai.mp4"
    ffmpeg \
      -i "$INPUT" \
      -vf "scale=1280:720,fps=1" \
      -c:v libx264 \
      -crf 28 \
      -preset fast \
      -c:a aac \
      -b:a 32k \
      -ac 1 \
      "$OUTPUT"
  """
]

[tasks.compress-short]
description = "Compress first 60 seconds of video for AI analysis (720p, 1fps, low bitrate)"
run = [
  """
    INPUT={{arg(name="input")}}
    OUTPUT="${INPUT%.*}-ai.mp4"
    ffmpeg \
      -t 60 \
      -i "$INPUT" \
      -vf "scale=1280:720,fps=1" \
      -c:v libx264 \
      -crf 28 \
      -preset fast \
      -c:a aac \
      -b:a 32k \
      -ac 1 \
      "$OUTPUT"
  """
]
